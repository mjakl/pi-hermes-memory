<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 920 540" role="img" aria-label="Security Flow">
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#111827}.title{font-size:30px;font-weight:700}.box-title{fill:#fff;font-size:18px;font-weight:700}.box-text{fill:#eef2ff;font-size:14px}.caption{fill:#4b5563;font-size:14px}.arrow{stroke:#6b7280;stroke-width:2;marker-end:url(#arrow)}.box{rx:16;ry:16;filter:url(#shadow)}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111827" flood-opacity="0.18"/></filter></defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="40" y="55" class="title">Security Flow</text>
<rect class="box" x="40" y="100" width="250" height="170" fill="#16213e"/>
<text x="60" y="134" class="box-title">Write request</text>
<text x="60" y="162" class="box-text">memory or skill tool call</text>
<text x="60" y="185" class="box-text">Content supplied by model</text>
<text x="60" y="208" class="box-text">Scope/target validated</text>
<rect class="box" x="330" y="100" width="250" height="170" fill="#0b525b"/>
<text x="350" y="134" class="box-title">scanContent</text>
<text x="350" y="162" class="box-text">Blocks prompt injection</text>
<text x="350" y="185" class="box-text">Blocks secrets/tokens</text>
<text x="350" y="208" class="box-text">Blocks invisible unicode</text>
<rect class="box" x="620" y="100" width="250" height="170" fill="#1b4332"/>
<text x="640" y="134" class="box-title">Persist</text>
<text x="640" y="162" class="box-text">Atomic Markdown/SKILL.md write</text>
<text x="640" y="185" class="box-text">No SQLite-only fallback</text>
<text x="640" y="208" class="box-text">Warn if mirror sync fails</text>
<rect class="box" x="40" y="340" width="250" height="150" fill="#3a0ca3"/>
<text x="60" y="374" class="box-title">Overflow strategy</text>
<text x="60" y="402" class="box-text">auto-consolidate</text>
<text x="60" y="425" class="box-text">fifo-evict</text>
<text x="60" y="448" class="box-text">reject</text>
<rect class="box" x="330" y="340" width="250" height="150" fill="#6a4c93"/>
<text x="350" y="374" class="box-title">Search output</text>
<text x="350" y="402" class="box-text">memory_search fenced</text>
<text x="350" y="425" class="box-text">session_search fenced</text>
<text x="350" y="448" class="box-text">Treat as context only</text>
<rect class="box" x="620" y="340" width="250" height="150" fill="#0f3460"/>
<text x="640" y="374" class="box-title">Authority rule</text>
<text x="640" y="402" class="box-text">Current user request wins</text>
<text x="640" y="425" class="box-text">Repo files/tool output win</text>
<text x="640" y="448" class="box-text">Memory is not instruction</text>
<line class="arrow" x1="300" y1="185.0" x2="318" y2="185.0"/>
<line class="arrow" x1="590" y1="185.0" x2="608" y2="185.0"/>
<line class="arrow" x1="300" y1="415.0" x2="318" y2="415.0"/>
<line class="arrow" x1="590" y1="415.0" x2="608" y2="415.0"/>
</svg>