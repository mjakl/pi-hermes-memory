<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1100 620" role="img" aria-label="Pi Hermes Memory Architecture">
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#111827}.title{font-size:30px;font-weight:700}.box-title{fill:#fff;font-size:18px;font-weight:700}.box-text{fill:#eef2ff;font-size:14px}.caption{fill:#4b5563;font-size:14px}.arrow{stroke:#6b7280;stroke-width:2;marker-end:url(#arrow)}.box{rx:16;ry:16;filter:url(#shadow)}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111827" flood-opacity="0.18"/></filter></defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="40" y="55" class="title">Pi Hermes Memory Architecture</text>
<rect class="box" x="40" y="100" width="300" height="170" fill="#16213e"/>
<text x="60" y="134" class="box-title">Markdown source of truth</text>
<text x="60" y="162" class="box-text">MEMORY.md + USER.md</text>
<text x="60" y="185" class="box-text">failures.md with categories</text>
<text x="60" y="208" class="box-text">projects-memory/<project>/</text>
<rect class="box" x="400" y="100" width="300" height="170" fill="#0b525b"/>
<text x="420" y="134" class="box-title">SQLite search store</text>
<text x="420" y="162" class="box-text">sessions.db</text>
<text x="420" y="185" class="box-text">memory_fts for memory_search</text>
<text x="420" y="208" class="box-text">message_fts for session_search</text>
<rect class="box" x="760" y="100" width="300" height="170" fill="#1b4332"/>
<text x="780" y="134" class="box-title">Policy-only prompt</text>
<text x="780" y="162" class="box-text">memoryPolicyStyle controls text</text>
<text x="780" y="185" class="box-text">No full Markdown dump by default</text>
<text x="780" y="208" class="box-text">Search when durable context helps</text>
<rect class="box" x="40" y="340" width="300" height="170" fill="#3a0ca3"/>
<text x="60" y="374" class="box-title">Skills</text>
<text x="60" y="402" class="box-text">Global + project SKILL.md</text>
<text x="60" y="425" class="box-text">resources_discover for project skills</text>
<text x="60" y="448" class="box-text">Managed by skill tool</text>
<rect class="box" x="400" y="340" width="300" height="170" fill="#6a4c93"/>
<text x="420" y="374" class="box-title">Tools</text>
<text x="420" y="402" class="box-text">memory / memory_search</text>
<text x="420" y="425" class="box-text">session_search</text>
<text x="420" y="448" class="box-text">skill create/view/patch/update/delete</text>
<rect class="box" x="760" y="340" width="300" height="170" fill="#0f3460"/>
<text x="780" y="374" class="box-title">Safety</text>
<text x="780" y="402" class="box-text">scanContent on writes</text>
<text x="780" y="425" class="box-text">fenced search results</text>
<text x="780" y="448" class="box-text">repo/tool evidence wins</text>
<line class="arrow" x1="350" y1="185.0" x2="388" y2="185.0"/>
<line class="arrow" x1="710" y1="185.0" x2="748" y2="185.0"/>
<line class="arrow" x1="350" y1="425.0" x2="388" y2="425.0"/>
<line class="arrow" x1="710" y1="425.0" x2="748" y2="425.0"/>
</svg>