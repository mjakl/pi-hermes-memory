<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 880 560" role="img" aria-label="Session Lifecycle">
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#111827}.title{font-size:30px;font-weight:700}.box-title{fill:#fff;font-size:18px;font-weight:700}.box-text{fill:#eef2ff;font-size:14px}.caption{fill:#4b5563;font-size:14px}.arrow{stroke:#6b7280;stroke-width:2;marker-end:url(#arrow)}.box{rx:16;ry:16;filter:url(#shadow)}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111827" flood-opacity="0.18"/></filter></defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="40" y="55" class="title">Session Lifecycle</text>
<rect class="box" x="40" y="100" width="240" height="170" fill="#16213e"/>
<text x="60" y="134" class="box-title">Session start</text>
<text x="60" y="162" class="box-text">Load Markdown memories</text>
<text x="60" y="185" class="box-text">Refresh project skill context</text>
<text x="60" y="208" class="box-text">Best-effort Markdown sync</text>
<rect class="box" x="320" y="100" width="240" height="170" fill="#0b525b"/>
<text x="340" y="134" class="box-title">Before agent</text>
<text x="340" y="162" class="box-text">Append memory policy</text>
<text x="340" y="185" class="box-text">No full memory injection</text>
<text x="340" y="208" class="box-text">Tools are registered</text>
<rect class="box" x="600" y="100" width="240" height="170" fill="#1b4332"/>
<text x="620" y="134" class="box-title">During chat</text>
<text x="620" y="162" class="box-text">memory saves Markdown</text>
<text x="620" y="185" class="box-text">SQLite mirror syncs on success</text>
<text x="620" y="208" class="box-text">skills saved deliberately</text>
<rect class="box" x="40" y="340" width="240" height="170" fill="#3a0ca3"/>
<text x="60" y="374" class="box-title">Corrections</text>
<text x="60" y="402" class="box-text">Detect correction patterns</text>
<text x="60" y="425" class="box-text">Spawn focused child Pi prompt</text>
<text x="60" y="448" class="box-text">Save categorized lesson</text>
<rect class="box" x="320" y="340" width="240" height="170" fill="#6a4c93"/>
<text x="340" y="374" class="box-title">Search</text>
<text x="340" y="402" class="box-text">memory_search durable context</text>
<text x="340" y="425" class="box-text">session_search history</text>
<text x="340" y="448" class="box-text">Results are fenced context</text>
<rect class="box" x="600" y="340" width="240" height="170" fill="#0f3460"/>
<text x="620" y="374" class="box-title">Session end</text>
<text x="620" y="402" class="box-text">Flush durable learnings</text>
<text x="620" y="425" class="box-text">Index current session file</text>
<text x="620" y="448" class="box-text">Best-effort shutdown work</text>
<line class="arrow" x1="290" y1="185.0" x2="308" y2="185.0"/>
<line class="arrow" x1="570" y1="185.0" x2="588" y2="185.0"/>
<line class="arrow" x1="290" y1="425.0" x2="308" y2="425.0"/>
<line class="arrow" x1="570" y1="425.0" x2="588" y2="425.0"/>
</svg>